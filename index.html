<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GORILLA 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#010208;font-family:'Share Tech Mono',monospace;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#010208;}
#gameCanvas{display:block;touch-action:none;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;}
.hidden{display:none!important;}

/* ── TITLE ── */
#titleScreen{background:radial-gradient(ellipse at 50% 40%,rgba(0,40,80,.7),rgba(1,2,8,.98));gap:12px;}
.edition{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:10px;color:#00f5c8;text-transform:uppercase;opacity:.7;}
.title-main{font-family:'Orbitron',sans-serif;font-size:clamp(40px,11vw,76px);font-weight:900;
  letter-spacing:6px;line-height:1;
  background:linear-gradient(135deg,#00f5c8 0%,#00aaff 40%,#ff2d6f 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 24px rgba(0,245,200,.3));}
.title-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#334466;letter-spacing:6px;}
.mode-label{font-size:8px;letter-spacing:5px;color:#445566;margin-top:12px;text-transform:uppercase;}
.mode-row{display:flex;gap:14px;margin-top:8px;}
.mode-btn{padding:12px 20px;background:transparent;font-family:'Share Tech Mono',monospace;font-size:11px;
  font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:3px;text-align:center;line-height:1.6;transition:all .2s;}
.mode-btn.p1{border:1px solid #00f5c8;color:#00f5c8;box-shadow:0 0 16px #00f5c822,inset 0 0 16px #00f5c808;}
.mode-btn.p2{border:1px solid #ff2d6f;color:#ff2d6f;box-shadow:0 0 16px #ff2d6f22,inset 0 0 16px #ff2d6f08;}
.mode-btn:hover{filter:brightness(1.3);}
.mode-btn:active{opacity:.7;}
.tip{display:flex;flex-direction:column;gap:5px;color:#445566;font-size:9px;text-align:center;margin-top:10px;line-height:1.9;}
.c1{color:#00f5c8;}.c2{color:#ff2d6f;}.c3{color:#ffd000;}
.dos-credit{font-size:7px;color:#223344;letter-spacing:3px;margin-top:12px;}

/* ── GAME OVER ── */
#gameOver{background:radial-gradient(ellipse at 50% 40%,rgba(0,20,50,.85),rgba(1,2,8,.96));gap:12px;}
.round-lbl{font-size:8px;letter-spacing:7px;color:#334455;text-transform:uppercase;}
.winner-txt{font-family:'Orbitron',sans-serif;font-size:clamp(28px,8vw,52px);font-weight:900;line-height:1;letter-spacing:2px;}
.score-row{display:flex;gap:32px;align-items:center;margin-top:8px;}
.sv{font-family:'Orbitron',sans-serif;font-size:clamp(24px,7vw,36px);font-weight:900;text-align:center;}
.sl{font-size:8px;letter-spacing:3px;color:#334455;text-align:center;margin-top:4px;}
.score-sep{color:#223344;font-size:28px;}
.btn-row{display:flex;gap:14px;margin-top:14px;}
.btn{padding:12px 26px;background:transparent;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:3px;cursor:pointer;border-radius:3px;transition:all .2s;}
.btn-primary{border:1px solid #00f5c8;color:#00f5c8;box-shadow:0 0 14px #00f5c822;}
.btn-secondary{border:1px solid #223344;color:#445566;}
.btn:hover{filter:brightness(1.4);}

/* ── IN-GAME ── */
#controls{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;pointer-events:none;}
#chargeHint{color:#334455;font-size:7px;letter-spacing:2px;text-align:center;pointer-events:none;}
#aiThinking{position:absolute;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(2,5,16,.88);border:1px solid #ff2d6f55;color:#ff2d6f;
  font-size:8px;letter-spacing:4px;padding:5px 16px;pointer-events:none;white-space:nowrap;
  box-shadow:0 0 14px #ff2d6f22;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div class="overlay hidden" id="titleScreen">
    <div class="edition">◈ 2026 EDITION ◈</div>
    <div class="title-main">GORILLA</div>
    <div class="title-sub">THE BANANA WARS</div>
    <div class="mode-label">— scegli modalità —</div>
    <div class="mode-row">
      <button class="mode-btn p1" id="btn1v1">👥 1 vs 1<br><small style="font-size:8px;opacity:.7">stesso schermo</small></button>
      <button class="mode-btn p2" id="btn1vAI">🤖 vs AI<br><small style="font-size:8px;opacity:.7">sfida il computer</small></button>
    </div>
    <div class="tip">
      <div>🖱️ <span class="c1">Muovi il cursore</span> attorno al gorilla → angolo</div>
      <div>🖱️ <span class="c2">Tieni premuto</span> → carica potenza</div>
      <div>🖱️ <span class="c3">Rilascia</span> per sparare</div>
    </div>
    <div class="dos-credit">INSPIRED BY GORILLAS.BAS — DOS 1991</div>
  </div>
  <div class="overlay hidden" id="gameOver">
    <div class="round-lbl">round over</div>
    <div class="winner-txt" id="winnerText"></div>
    <div class="score-row">
      <div><div class="sv" id="s0" style="color:#00ffe0">0</div><div class="sl" id="l0">P1</div></div>
      <div class="score-sep">:</div>
      <div><div class="sv" id="s1" style="color:#ff3c78">0</div><div class="sl" id="l1">P2</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="rematchBtn">REMATCH</button>
      <button class="btn btn-secondary" id="menuBtn">MENU</button>
    </div>
  </div>
  <div id="controls" class="hidden">
    <div id="chargeHint">⚡ TIENI PREMUTO per caricare · RILASCIA per sparare</div>
  </div>
  <div id="aiThinking" class="hidden">🤖 AI CALCOLA...</div>
</div>
<script>
// ══════════════════════════════════════════════════════════════
//  GORILLA 2026  ·  v4  ·  all fixes applied
// ══════════════════════════════════════════════════════════════

// ── palette 2026 ──────────────────────────────────────────────
const C={
  p1:'#00f5c8',   p2:'#ff2d6f',
  banana:'#ffd000', expl:'#ff5500',
  sky0:'#010208', sky1:'#050d18', sky2:'#0a1828',
  moon:'#e8f4ff',
  road:'#080c14',
  hudBg:'rgba(1,4,12,.88)', hudLine:'rgba(0,180,140,.2)',
  // building accent colours per palette
};

// ── canvas & game state ───────────────────────────────────────
let CW=700, CH=390;
const GRAV=9.8, DT=0.042, GW=48, GH=60, N_BLDG=9;
let EXPL_R=36;
let canvas, ctx, offCtx;   // offCtx = offscreen for building craters
let state=null, scores=[0,0], raf=null, drag=null, mode='1v1';

const rnd=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;

// ══════════════════════════════════════════════════════════════
//  BUILDINGS  — modern skyscrapers with glass, neon signs
// ══════════════════════════════════════════════════════════════
const BLDG_PALETTES=[
  {body:'#07111f',glass:'#0e2540',trim:'#00f5c8',sign:'#00f5c8'},
  {body:'#12061e',glass:'#1e0a32',trim:'#bf5fff',sign:'#df9fff'},
  {body:'#1a0808',glass:'#2e1010',trim:'#ff4455',sign:'#ff8899'},
  {body:'#0a1400',glass:'#142200',trim:'#44ff88',sign:'#88ffaa'},
  {body:'#150d00',glass:'#281800',trim:'#ff9900',sign:'#ffcc44'},
  {body:'#000d1a',glass:'#001530',trim:'#00aaff',sign:'#66ccff'},
];

function buildCity(){
  const bs=[], minW=CW/(N_BLDG+1), maxW=CW/(N_BLDG-1);
  let x=0;
  for(let i=0;i<N_BLDG;i++){
    const w = i===N_BLDG-1 ? CW-x : rnd(minW,maxW);
    const h = rnd(CH*0.30, CH*0.70);
    const pal = BLDG_PALETTES[Math.floor(Math.random()*BLDG_PALETTES.length)];
    // building style: 0=glass curtain, 1=setback, 2=brutalist
    const style = Math.floor(Math.random()*3);
    // windows
    const wins=[];
    const cols=Math.floor(w/12), rows=Math.floor(h/14);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(Math.random()>.28) wins.push({
        x: x+4+c*12, y: CH-h+4+r*14,
        on: Math.random()>.32,
        flicker: Math.random()>.85,
        phase: Math.random()*TAU,
        col: Math.random()>.6 ? pal.glass : '#ffe8b0',
      });
    }
    bs.push({x, y:CH-h, w, h, pal, style, wins,
             // crater list stored as {cx,cy,r} — drawn on offscreen
             craters:[],
             // offscreen canvas for this building (draw once, re-draw on crater)
             off:null });
    x+=w;
  }
  return bs;
}

// Render a single building to its offscreen canvas
function renderBuildingOff(b){
  const oc=document.createElement('canvas');
  oc.width=Math.ceil(b.w)+2; oc.height=Math.ceil(b.h)+2;
  const c=oc.getContext('2d');
  const lx=0, ly=0, lw=oc.width, lh=oc.height;

  // body
  const bodyGrad=c.createLinearGradient(0,0,lw,0);
  bodyGrad.addColorStop(0, b.pal.body);
  bodyGrad.addColorStop(0.5, shadeHex(b.pal.body,1.3));
  bodyGrad.addColorStop(1, b.pal.body);
  c.fillStyle=bodyGrad; c.fillRect(0,0,lw,lh);

  // glass curtain wall panels (style 0 & 1)
  if(b.style===0){
    const panW=Math.max(8,lw/5);
    for(let px=0;px<lw;px+=panW){
      const g2=c.createLinearGradient(px,0,px+panW,0);
      g2.addColorStop(0,'rgba(0,0,0,.3)');
      g2.addColorStop(.4, b.pal.glass+'88');
      g2.addColorStop(1,'rgba(0,0,0,.2)');
      c.fillStyle=g2; c.fillRect(px,0,panW,lh);
      c.strokeStyle='rgba(255,255,255,.06)'; c.lineWidth=.5;
      c.strokeRect(px,0,panW,lh);
    }
    // horizontal floor lines
    const flH=Math.max(8,lh/Math.round(lh/12));
    for(let fy=0;fy<lh;fy+=flH){
      c.strokeStyle='rgba(255,255,255,.04)'; c.lineWidth=.5;
      c.beginPath(); c.moveTo(0,fy); c.lineTo(lw,fy); c.stroke();
    }
  } else if(b.style===1){
    // setback: darker stripes
    for(let fy=0;fy<lh;fy+=18){
      c.fillStyle='rgba(0,0,0,.18)'; c.fillRect(0,fy,lw,2);
    }
  } else {
    // brutalist: concrete panels with shadow seams
    const pw=Math.max(12,lw/4);
    for(let px=0;px<lw;px+=pw){
      c.strokeStyle='rgba(0,0,0,.4)'; c.lineWidth=1.5;
      c.beginPath(); c.moveTo(px,0); c.lineTo(px,lh); c.stroke();
    }
    for(let fy=0;fy<lh;fy+=16){
      c.strokeStyle='rgba(0,0,0,.3)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(0,fy); c.lineTo(lw,fy); c.stroke();
    }
  }

  // trim colour vertical edge strips
  c.fillStyle=b.pal.trim+'44';
  c.fillRect(0,0,2,lh);
  c.fillRect(lw-2,0,2,lh);

  // rooftop detail — parapet + antenna
  c.fillStyle=shadeHex(b.pal.body,1.5);
  c.fillRect(0,0,lw,6);
  c.strokeStyle=b.pal.trim+'aa'; c.lineWidth=1.5;
  c.beginPath(); c.moveTo(0,6); c.lineTo(lw,6); c.stroke();
  // antenna
  c.strokeStyle=b.pal.trim; c.lineWidth=1.5;
  c.beginPath(); c.moveTo(lw/2,6); c.lineTo(lw/2,-12); c.stroke();
  c.fillStyle=b.pal.sign; c.shadowColor=b.pal.sign; c.shadowBlur=6;
  c.beginPath(); c.arc(lw/2,-12,2.5,0,TAU); c.fill();
  c.shadowBlur=0;

  // neon sign band near top (~20% from top)
  const signY=lh*0.15;
  c.fillStyle=b.pal.sign+'33';
  c.fillRect(4,signY-5,lw-8,10);
  c.strokeStyle=b.pal.sign+'88'; c.lineWidth=1;
  c.strokeRect(4,signY-5,lw-8,10);
  // glow line
  c.strokeStyle=b.pal.sign; c.lineWidth=1; c.shadowColor=b.pal.sign; c.shadowBlur=8;
  c.beginPath(); c.moveTo(4,signY); c.lineTo(lw-4,signY); c.stroke();
  c.shadowBlur=0;

  // windows (translated to local coords)
  b.wins.forEach(w=>{
    if(!w.on) return;
    const wx=w.x-b.x, wy=w.y-b.y;
    c.fillStyle=w.col; c.shadowColor=w.col; c.shadowBlur=5;
    c.fillRect(wx,wy,8,9);
    // reflection shimmer
    c.fillStyle='rgba(255,255,255,.15)';
    c.fillRect(wx,wy,3,2);
    c.shadowBlur=0;
  });

  // crater mask (destination-out)
  b.craters.forEach(cr=>{
    const lcx=cr.cx-b.x, lcy=cr.cy-b.y;
    const rg=c.createRadialGradient(lcx,lcy,0,lcx,lcy,cr.r);
    rg.addColorStop(0,'rgba(0,0,0,1)');
    rg.addColorStop(.6,'rgba(0,0,0,.9)');
    rg.addColorStop(1,'rgba(0,0,0,0)');
    c.save(); c.globalCompositeOperation='destination-out';
    c.fillStyle=rg;
    c.beginPath(); c.arc(lcx,lcy,cr.r,0,TAU); c.fill();
    c.restore();
    // scorch ring on main canvas later (drawn in drawBuildings)
  });

  b.off=oc;
}

function shadeHex(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b2=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b2].map(v=>Math.min(255,Math.round(v*f)).toString(16).padStart(2,'0')).join('');
}

function placeGorillas(bs){
  const b1=bs[1], b2=bs[bs.length-2];
  return [
    {x:b1.x+b1.w/2-GW/2, y:b1.y-GH},
    {x:b2.x+b2.w/2-GW/2, y:b2.y-GH},
  ];
}

function genStars(n){
  return Array.from({length:n},()=>({
    x:rnd(0,CW), y:rnd(0,CH*0.52),
    r:rnd(.2,1.5), phase:rnd(0,TAU),
    bright:Math.random()>.85
  }));
}

// ══════════════════════════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════════════════════════
function stepBanana(b,wind){
  return{
    pos:{x:b.pos.x+b.vel.x*DT, y:b.pos.y+b.vel.y*DT},
    vel:{x:b.vel.x+wind*DT,    y:b.vel.y+GRAV*DT},
    spin:b.spin+DT*10
  };
}
function hitBuilding(pos,bs){
  for(let i=0;i<bs.length;i++){
    const b=bs[i];
    if(pos.x>=b.x&&pos.x<=b.x+b.w&&pos.y>=b.y&&pos.y<=CH-14) return i;
  }
  return -1;
}
function hitGorilla(pos,gors,shooter){
  // Check opponent first (priority), then self — suicide is possible!
  const order=[1-shooter, shooter];
  for(const i of order){
    const g=gors[i], dx=pos.x-(g.x+GW/2), dy=pos.y-(g.y+GH/2);
    if(Math.sqrt(dx*dx+dy*dy)<EXPL_R*.75) return i;
  }
  return -1;
}
function blastBuilding(b,cx,cy,r){
  // Merge with nearby crater if within 1.5× radius, else add new one
  let merged=false;
  for(const cr of b.craters){
    const d=Math.hypot(cx-cr.cx, cy-cr.cy);
    if(d < cr.r*1.5){
      // Weighted center + grow radius
      const nr=Math.min(cr.r + r*0.6, r*3.8);
      cr.cx=(cr.cx*cr.r + cx*r)/(cr.r+r);
      cr.cy=(cr.cy*cr.r + cy*r)/(cr.r+r);
      cr.r=nr;
      merged=true; break;
    }
  }
  if(!merged) b.craters.push({cx,cy,r});
  renderBuildingOff(b);
}

// ══════════════════════════════════════════════════════════════
//  AI
// ══════════════════════════════════════════════════════════════
function computeAI(){
  const src=state.gorillas[1], tgt=state.gorillas[0];
  const sx=src.x+GW/2, sy=src.y+GH*.28;
  const tx=tgt.x+GW/2, ty=tgt.y+GH/2;
  let bA=90,bP=55,bD=Infinity;
  for(let a=5;a<=175;a+=2) for(let p=20;p<=100;p+=4){
    const rad=(180-a)*Math.PI/180, spd=p*1.55;
    let px=sx,py=sy,pvx=Math.cos(-rad)*spd,pvy=Math.sin(-rad)*spd,md=Infinity;
    for(let s=0;s<300;s++){
      pvx+=state.wind*DT; pvy+=GRAV*DT; px+=pvx*DT; py+=pvy*DT;
      if(px<0||px>CW||py>CH) break;
      const d=Math.hypot(px-tx,py-ty);
      if(d<md) md=d;
      if(d<EXPL_R) break;
    }
    if(md<bD){bD=md;bA=a;bP=p;}
  }
  return {angle:bA+rnd(-7,7), power:Math.min(100,bP+rnd(-5,5))};
}

// ══════════════════════════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════════════════════════
function initGame(m){
  if(m) mode=m;
  const buildings=buildCity();
  buildings.forEach(b=>renderBuildingOff(b));
  const gorillas=placeGorillas(buildings);
  // FIX 1: angles/powers stored as plain arrays, accessed by index — no getter/setter ambiguity
  state={
    buildings, gorillas,
    wind: rnd(-10,10),
    stars: genStars(60),
    turn:0, phase:'aiming',
    angles:[45,135],  // per-player, never reset between turns
    powers:[55,55],
    banana:null, explosion:null, expParts:[],
    throwAnim:false, celebEnd:0, t:0, aiTimer:0,
  };
  document.getElementById('l1').textContent=mode==='vsAI'?'AI':'P2';
  show('playing');
}

// FIX 1: access angle/power always via state.angles[state.turn]
function curAngle(){ return state.angles[state.turn]; }
function curPower(){ return state.powers[state.turn]; }

function nextTurn(){
  state.phase='aiming'; state.turn=1-state.turn;
  state.banana=null; state.throwAnim=false;
  state.wind=rnd(-10,10); state.explosion=null;
  if(mode==='vsAI'&&state.turn===1){
    state.aiTimer=state.t+1.0;
    document.getElementById('aiThinking').classList.remove('hidden');
  }
}

function fire(){
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  doFire(curAngle(), curPower());
}

function doFire(angle,power){
  const g=state.gorillas[state.turn];
  const cx=g.x+GW/2, cy=g.y+GH*.28;
  const rad=(state.turn===0?angle:180-angle)*Math.PI/180;
  const spd=power*1.55;
  state.banana={pos:{x:cx,y:cy},vel:{x:Math.cos(-rad)*spd,y:Math.sin(-rad)*spd},spin:0};
  state.phase='flying'; state.throwAnim=true;
}

function triggerExplosion(x,y,killed){
  state.phase='exploding'; state.banana=null; state.throwAnim=false;
  state.expParts=Array.from({length:28},()=>({
    x,y,vx:rnd(-1.4,1.4),vy:rnd(-2.4,.8),r:rnd(2,7),
    col:[C.expl,C.banana,'#ff2200','#ffaa00','#ffffff'][Math.floor(Math.random()*5)]
  }));
  state.explosion={x,y,t0:state.t,dur:.9,killed};
}

function show(screen){
  ['titleScreen','gameOver','controls','aiThinking'].forEach(id=>
    document.getElementById(id).classList.add('hidden'));
  if(screen==='title')    document.getElementById('titleScreen').classList.remove('hidden');
  if(screen==='gameover') document.getElementById('gameOver').classList.remove('hidden');
  if(screen==='playing')  document.getElementById('controls').classList.remove('hidden');
}

// ══════════════════════════════════════════════════════════════
//  DRAW — BACKGROUND  2026
// ══════════════════════════════════════════════════════════════
function drawBg(){
  const sg=ctx.createLinearGradient(0,0,0,CH);
  sg.addColorStop(0,'#010208'); sg.addColorStop(.55,'#04091a'); sg.addColorStop(1,'#081428');
  ctx.fillStyle=sg; ctx.fillRect(0,0,CW,CH);

  // stars with occasional bright spike-glare
  state.stars.forEach(s=>{
    const twinkle=.2+.8*Math.abs(Math.sin(state.t*.4+s.phase));
    ctx.globalAlpha=twinkle*(s.bright?.95:.38);
    ctx.fillStyle=s.bright?'#ffffff':'#aaccff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill();
    if(s.bright){
      ctx.globalAlpha=twinkle*.28; ctx.strokeStyle='#ddeeff'; ctx.lineWidth=.5;
      const sp=s.r*5;
      ctx.beginPath();
      ctx.moveTo(s.x-sp,s.y); ctx.lineTo(s.x+sp,s.y);
      ctx.moveTo(s.x,s.y-sp); ctx.lineTo(s.x,s.y+sp);
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1;

  // Moon — detailed with terminator
  const mr=Math.max(18,CW*.032), mx=CW*.83, my=CH*.1;

// ── WIND INDICATOR ────────────────────────────────────────────
function drawWindIndicator(){
  if(!state) return;
  const wind=state.wind, absW=Math.abs(wind), goRight=wind>=0;
  const strength=Math.min(absW/10,1);
  const windCol=goRight?C.p1:C.p2;
  const cx=CW/2, cy=CH*0.16+Math.sin(state.t*1.8)*2.5;
  ctx.save(); ctx.translate(cx,cy);
  const pw=200,ph=30;
  ctx.fillStyle='rgba(4,10,26,.72)';
  ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph,ph/2); ctx.fill();
  ctx.strokeStyle=windCol+'44'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#334455'; ctx.font='bold 7px "Courier New",monospace'; ctx.textAlign='left';
  ctx.fillText('VENTO',-pw/2+10,-ph/2-4);
  const tw=130;
  ctx.fillStyle='rgba(255,255,255,.04)';
  ctx.beginPath(); ctx.roundRect(-tw/2,-3,tw,6,3); ctx.fill();
  const fw=strength*tw;
  const fg=ctx.createLinearGradient(-tw/2,0,tw/2,0);
  fg.addColorStop(0,windCol+'18'); fg.addColorStop(goRight?1:0,windCol);
  ctx.fillStyle=fg;
  if(goRight){ctx.beginPath();ctx.roundRect(-tw/2,-3,fw,6,3);ctx.fill();}
  else{ctx.beginPath();ctx.roundRect(tw/2-fw,-3,fw,6,3);ctx.fill();}
  const ax=goRight?-tw/2+fw+Math.sin(state.t*5)*3*strength:tw/2-fw-Math.sin(state.t*5)*3*strength;
  const ad=goRight?1:-1;
  ctx.fillStyle=windCol; ctx.shadowColor=windCol; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax-ad*12,-7); ctx.lineTo(ax-ad*12,7); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle=windCol; ctx.font='bold 10px "Courier New",monospace'; ctx.textAlign='right';
  ctx.fillText(`${goRight?'→':'←'} ${absW.toFixed(1)}`,pw/2-10,4);
  ctx.restore();
}

function drawExplosion(){
  if(!state.explosion) return;
  const ex=state.explosion, p=Math.min((state.t-ex.t0)/ex.dur,1), ep=1-p;
  ctx.save();
  [1.0,1.45,1.9].forEach((sc,i)=>{
    const rp=Math.max(0,p-i*.1);
    if(rp<=0)return;
    ctx.globalAlpha=ep*.45*(1-i*.2);
    ctx.strokeStyle=i===0?'#ffeeaa':i===1?C.expl:'#ff1100';
    ctx.lineWidth=(3-i)*(1-rp);
    ctx.beginPath(); ctx.arc(ex.x,ex.y,EXPL_R*rp*sc,0,TAU); ctx.stroke();
  });
  ctx.globalAlpha=1;
  const rg=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,EXPL_R*ep*.9);
  rg.addColorStop(0,`rgba(255,255,240,${ep*.98})`);
  rg.addColorStop(.2,`rgba(255,200,50,${ep*.9})`);
  rg.addColorStop(.55,`rgba(255,80,0,${ep*.7})`);
  rg.addColorStop(1,'rgba(180,0,0,0)');
  ctx.fillStyle=rg; ctx.shadowColor='#ff8800'; ctx.shadowBlur=28*ep;
  ctx.beginPath(); ctx.arc(ex.x,ex.y,EXPL_R*ep*.9,0,TAU); ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();
  state.expParts.forEach(pt=>{
    const px=pt.x+pt.vx*p*55, py=pt.y+pt.vy*p*55+.5*GRAV*p*p*35;
    ctx.save(); ctx.globalAlpha=ep*.9; ctx.fillStyle=pt.col; ctx.shadowColor=pt.col; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(px,py,pt.r*ep,0,TAU); ctx.fill(); ctx.restore();
  });
}

//  DRAW — AIM GUIDE  2026
// ══════════════════════════════════════════════════════════════
function drawAimGuide(){
  if(state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const g=state.gorillas[state.turn], col=state.turn===0?C.p1:C.p2;
  const cx=g.x+GW/2, cy=g.y+GH*.28;
  const aRad=(state.turn===0?curAngle():180-curAngle())*Math.PI/180;
  const spd=curPower()*1.55;
  let px=cx,py=cy,pvx=Math.cos(-aRad)*spd,pvy=Math.sin(-aRad)*spd;
  const pts=[];
  for(let i=0;i<80;i++){
    pvx+=state.wind*DT*3; pvy+=GRAV*DT*3; px+=pvx*DT*3; py+=pvy*DT*3;
    if(px<-10||px>CW+10||py>CH+10)break;
    pts.push({x:px,y:py});
  }
  ctx.save();
  pts.forEach((pt,i)=>{
    if(i===0||i%2===0)return;
    const fade=1-i/pts.length;
    ctx.globalAlpha=fade*.22; ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pts[i-1].x,pts[i-1].y); ctx.lineTo(pt.x,pt.y); ctx.stroke();
  });
  ctx.globalAlpha=1;
  const arrowLen=46, ax=cx+Math.cos(-aRad)*arrowLen, ay=cy+Math.sin(-aRad)*arrowLen;
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ax,ay); ctx.stroke();
  const an=Math.atan2(ay-cy,ax-cx), ah=10;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(ax,ay);
  ctx.lineTo(ax-Math.cos(an-.5)*ah,ay-Math.sin(an-.5)*ah);
  ctx.lineTo(ax-Math.cos(an+.5)*ah,ay-Math.sin(an+.5)*ah);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  DRAW — HUD  2026  glassmorphism
// ══════════════════════════════════════════════════════════════
function drawHUD(){
  const HH=52;
  const hg=ctx.createLinearGradient(0,0,0,HH);
  hg.addColorStop(0,'rgba(2,6,18,.94)'); hg.addColorStop(1,'rgba(4,12,28,.84)');
  ctx.fillStyle=hg; ctx.fillRect(0,0,CW,HH);
  ctx.strokeStyle='rgba(0,200,160,.28)'; ctx.lineWidth=1; ctx.shadowColor='#00f5c8'; ctx.shadowBlur=5;
  ctx.beginPath(); ctx.moveTo(0,HH); ctx.lineTo(CW,HH); ctx.stroke(); ctx.shadowBlur=0;

  const fs=Math.max(11,CW*.017);
  ctx.font=`900 ${fs}px "Courier New",monospace`;
  ctx.fillStyle=C.p1; ctx.shadowColor=C.p1; ctx.shadowBlur=10; ctx.fillText(`P1  ${scores[0]}`,12,22); ctx.shadowBlur=0;
  ctx.fillStyle=C.p2; ctx.shadowColor=C.p2; ctx.shadowBlur=10; ctx.textAlign='right';
  ctx.fillText(`${scores[1]}  ${mode==='vsAI'?'AI':'P2'}`,CW-12,22); ctx.shadowBlur=0; ctx.textAlign='left';

  const tc=state.turn===0?C.p1:C.p2;
  const tn=mode==='vsAI'&&state.turn===1?'AI':`P${state.turn+1}`;
  const lblMap={flying:'● IN VOLO',exploding:'✦ BOOM',celebrating:'★ VITTORIA',done:''};
  const lbl=lblMap[state.phase]||`▸ ${tn} MIRA`;
  ctx.font=`bold ${Math.max(10,CW*.014)}px "Courier New",monospace`;
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=14; ctx.textAlign='center';
  ctx.fillText(lbl,CW/2,22); ctx.shadowBlur=0; ctx.textAlign='left';

  if(state.phase==='aiming'&&!(mode==='vsAI'&&state.turn===1)){
    const pwr=curPower(), isCharging=!!drag;
    ctx.fillStyle='#334455'; ctx.font='7px "Courier New",monospace'; ctx.textAlign='right';
    ctx.fillText(`${Math.round(curAngle())}°`,CW-12,38); ctx.textAlign='left';

    // segmented power bar
    const bx=CW/2-100, by=33, bw=200, bh=13, segs=20;
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(bx,by,bw,bh);
    const filledSegs=Math.round((pwr/100)*segs);
    for(let s=0;s<segs;s++){
      const fx=bx+s*(bw/segs)+1, fw=bw/segs-2;
      if(s<filledSegs){
        const t=s/segs;
        const sc=t<.5?lerpCol('#00f5c8','#ffd000',t*2):lerpCol('#ffd000','#ff2d6f',(t-.5)*2);
        const pulse=isCharging?.65+.35*Math.sin(state.t*12+s*.4):1;
        ctx.fillStyle=sc; ctx.globalAlpha=pulse; ctx.shadowColor=sc; ctx.shadowBlur=5;
        ctx.fillRect(fx,by+1,fw,bh-2); ctx.shadowBlur=0; ctx.globalAlpha=1;
      } else {
        ctx.fillStyle='rgba(255,255,255,.035)'; ctx.fillRect(fx,by+1,fw,bh-2);
      }
    }
    if(isCharging){
      const pulse=.4+.6*Math.abs(Math.sin(state.t*10));
      ctx.shadowColor=C.banana; ctx.shadowBlur=12*pulse; ctx.strokeStyle=C.banana+'bb'; ctx.lineWidth=1.5;
    } else {
      ctx.strokeStyle='rgba(0,180,140,.3)'; ctx.lineWidth=1;
    }
    ctx.strokeRect(bx,by,bw,bh); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.3)'; ctx.font='bold 7px "Courier New",monospace';
    ctx.fillText('PWR',bx+4,by+bh-2);
    ctx.textAlign='right'; ctx.fillText(`${Math.round(pwr)}%`,bx+bw-4,by+bh-2); ctx.textAlign='left';
    if(!isCharging){
      ctx.fillStyle='rgba(40,70,90,.9)'; ctx.font='7px "Courier New",monospace'; ctx.textAlign='center';
      ctx.fillText('TIENI PREMUTO · RILASCIA PER SPARARE',CW/2,by+bh+10); ctx.textAlign='left';
    }
  }
}

function lerpCol(a,b,t){
  const h=s=>parseInt(s,16);
  const r1=h(a.slice(1,3)),g1=h(a.slice(3,5)),b1=h(a.slice(5,7));
  const r2=h(b.slice(1,3)),g2=h(b.slice(3,5)),b2=h(b.slice(5,7));
  return '#'+[r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════
function loop(){
  if(!state){ raf=requestAnimationFrame(loop); return; }
  state.t+=DT;

  // AI
  if(mode==='vsAI'&&state.turn===1&&state.phase==='aiming'&&state.aiTimer>0&&state.t>=state.aiTimer){
    document.getElementById('aiThinking').classList.add('hidden');
    const sh=computeAI();
    state.angles[1]=sh.angle; state.powers[1]=sh.power;
    state.aiTimer=0;
    doFire(sh.angle,sh.power);
  }

  // physics
  if(state.phase==='flying'&&state.banana){
    for(let i=0;i<3;i++){
      state.banana=stepBanana(state.banana,state.wind);
      const pos=state.banana.pos;
      if(pos.x<-50||pos.x>CW+50||pos.y>CH+50){ nextTurn(); break; }
      const gh=hitGorilla(pos,state.gorillas,state.turn);
      if(gh!==-1){ triggerExplosion(pos.x,pos.y,gh); break; }
      const bh=hitBuilding(pos,state.buildings);
      if(bh!==-1){
        blastBuilding(state.buildings[bh],pos.x,pos.y,EXPL_R);
        triggerExplosion(pos.x,pos.y,-1); break;
      }
    }
  }

  if(state.phase==='exploding'){
    if((state.t-state.explosion.t0)/state.explosion.dur>=1){
      if(state.explosion.killed!==-1){
        state.killedPlayer=state.explosion.killed;
        state.phase='celebrating'; state.celebEnd=state.t+2.5;
      } else nextTurn();
    }
  }

  if(state.phase==='celebrating'&&state.t>=state.celebEnd){
    const killed=state.killedPlayer;
    // If you killed yourself, the opponent wins
    const winner = (killed===state.turn) ? 1-state.turn : state.turn;
    scores[winner]++;
    document.getElementById('s0').textContent=scores[0];
    document.getElementById('s1').textContent=scores[1];
    const wt=document.getElementById('winnerText');
    const wn=mode==='vsAI'&&winner===1?'AI':`P${winner+1}`;
    const suicide=killed===state.turn;
    wt.textContent=suicide?`💀 ${mode==='vsAI'&&state.turn===1?'AI':'P'+(state.turn+1)} SUICIDIO!`:`${wn} VINCE!`;
    wt.style.color=winner===0?C.p1:C.p2;
    wt.style.textShadow=`0 0 36px ${winner===0?C.p1:C.p2}`;
    state.phase='done'; show('gameover');
  }

  // charge power while holding
  updateCharge();

  // render
  ctx.clearRect(0,0,CW,CH);
  drawBg();
  drawBuildings();
  drawRoad();

  const beatHz=3, raw=(state.t*beatHz)%1;
  const beatPhase=raw<.4?raw/.4:1-(raw-.4)/.6;

  state.gorillas.forEach((g,i)=>{
    if(state.explosion&&state.explosion.killed===i) return;
    if(state.phase==='celebrating'&&state.killedPlayer===i) return; // self-kill: hide dead gorilla
    const cel=state.phase==='celebrating'&&state.turn===i&&state.killedPlayer!==i;
    const thr=state.throwAnim&&state.turn===i&&state.phase==='flying';
    drawGorilla(g,i,cel,thr,cel?beatPhase:0);
  });
  drawBanana(); drawExplosion(); drawAimGuide(); drawHUD();
  raf=requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════════
//  RESIZE & INPUT
// ══════════════════════════════════════════════════════════════
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  CW=vw>=vh?700:390; CH=vw>=vh?390:700;
  EXPL_R=Math.round(CW*.052);
  const scale=Math.min(vw/CW,vh/CH);
  canvas.width=CW; canvas.height=CH;
  canvas.style.width=Math.round(CW*scale)+'px';
  canvas.style.height=Math.round(CH*scale)+'px';
  if(state&&state.phase!=='done'){
    const b=buildCity(); b.forEach(bld=>renderBuildingOff(bld));
    state.buildings=b; state.gorillas=placeGorillas(b); state.stars=genStars(60);
    if(state.phase==='flying'||state.phase==='exploding'){
      state.phase='aiming'; state.banana=null; state.explosion=null; state.throwAnim=false;
    }
    show('playing');
  } else if(!state) show('title');
  else show('gameover');
}

function getPos(e){
  const r=canvas.getBoundingClientRect(), sx=CW/r.width, sy=CH/r.height;
  const s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};
}

// Charge rate: power ping-pongs 0→100→0 in CHARGE_CYCLE seconds total
const CHARGE_CYCLE=5.0;

// Compute angle from gorilla to cursor position (absolute, not relative)
function angleFromPos(pos){
  const g=state.gorillas[state.turn];
  const gx=g.x+GW/2, gy=g.y+GH*.28;
  const dx=pos.x-gx, dy=pos.y-gy;
  // atan2 gives angle in screen space (y down), convert to degrees 0-180
  // P0 (left) fires right: angle = degrees above horizontal to the right
  // P1 (right) fires left: mirrored
  let deg;
  if(state.turn===0){
    // angle 0=straight right, 90=up, 180=straight left
    deg = Math.atan2(-dy, dx) * 180/Math.PI;
  } else {
    // mirrored: angle 0=straight left, 90=up, 180=straight right
    deg = Math.atan2(-dy, -dx) * 180/Math.PI;
  }
  // clamp to 0-180 (no firing backwards/downward)
  return Math.max(1, Math.min(179, deg));
}

// mousemove on canvas (no button held) → update aim angle freely
function onHover(e){
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  if(drag) return; // already dragging/charging — handled by onMove
  const p=getPos(e);
  state.angles[state.turn]=angleFromPos(p);
}

function onDown(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const p=getPos(e);
  // Set angle immediately from click position
  state.angles[state.turn]=angleFromPos(p);
  // Start charge
  drag={ chargeStart:state.t };
  state.powers[state.turn]=0;
}

function onMove(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const p=getPos(e);
  // Always track angle from absolute position
  state.angles[state.turn]=angleFromPos(p);
}

function onUp(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming'||!drag){ drag=null; return; }
  if(mode==='vsAI'&&state.turn===1){ drag=null; return; }
  const pwr=Math.max(3, state.powers[state.turn]);
  drag=null;
  doFire(state.angles[state.turn], pwr);
}

// Called every frame: ping-pong power while held
function updateCharge(){
  if(!drag||!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const elapsed=state.t-drag.chargeStart;
  const half=CHARGE_CYCLE/2;
  const phase=elapsed%CHARGE_CYCLE;
  const pwr=phase<half?(phase/half)*100:(1-(phase-half)/half)*100;
  state.powers[state.turn]=Math.max(0,Math.min(100,pwr));
}

window.addEventListener('DOMContentLoaded',()=>{
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',()=>setTimeout(resize,250));
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp,{passive:false});
  canvas.addEventListener('mousedown',onDown);
  canvas.addEventListener('mousemove',(e)=>{ if(drag) onMove(e); else onHover(e); });
  canvas.addEventListener('mouseup',onUp);
  document.getElementById('btn1v1').addEventListener('click',()=>initGame('1v1'));
  document.getElementById('btn1vAI').addEventListener('click',()=>initGame('vsAI'));
  document.getElementById('rematchBtn').addEventListener('click',()=>initGame());
  document.getElementById('menuBtn').addEventListener('click',()=>{
    scores=[0,0];
    document.getElementById('s0').textContent='0';
    document.getElementById('s1').textContent='0';
    state=null; show('title');
  });
  raf=requestAnimationFrame(loop);
});
</script>
</body>
