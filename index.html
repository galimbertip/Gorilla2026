<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>GORILLA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
canvas{display:block;touch-action:none}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all}
.hide{display:none!important}
#ts{background:radial-gradient(ellipse at 50% 30%,rgba(0,30,60,.95),rgba(0,2,8,.99));gap:14px}
.ed{font-size:8px;letter-spacing:10px;color:#00f5c8;opacity:.7;text-transform:uppercase}
.tm{font-family:'Orbitron',sans-serif;font-size:clamp(44px,12vw,82px);font-weight:900;letter-spacing:5px;line-height:1;
  background:linear-gradient(135deg,#00f5c8,#0099ff 45%,#ff2d6f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(0,200,255,.3))}
.ts2{font-size:8px;color:#1a2a3a;letter-spacing:7px}
.ml{font-size:8px;letter-spacing:5px;color:#1e3040;margin-top:14px;text-transform:uppercase}
.mr{display:flex;gap:16px;margin-top:8px}
.mb{padding:13px 24px;background:rgba(0,0,0,.5);font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:4px;text-align:center;line-height:1.8;
  transition:all .25s;border:1px solid}
.mb.c1{border-color:#00f5c8;color:#00f5c8;box-shadow:0 0 20px #00f5c818,inset 0 0 20px #00f5c80a}
.mb.c2{border-color:#ff2d6f;color:#ff2d6f;box-shadow:0 0 20px #ff2d6f18,inset 0 0 20px #ff2d6f0a}
.mb:hover{filter:brightness(1.4);transform:translateY(-2px)}
.mb small{font-size:7px;opacity:.5;display:block}
.tip{display:flex;flex-direction:column;gap:5px;font-size:8px;text-align:center;margin-top:10px;color:#1e3040;line-height:2.1}
.c1{color:#00f5c8}.c2{color:#ff2d6f}.c3{color:#ffd000}
.cr{font-size:7px;color:#0d1a24;letter-spacing:3px;margin-top:12px}
#go{background:radial-gradient(ellipse at 50% 30%,rgba(0,20,50,.95),rgba(0,2,8,.99));gap:14px}
.rl{font-size:7px;letter-spacing:8px;color:#152030;text-transform:uppercase}
.wt{font-family:'Orbitron',sans-serif;font-size:clamp(28px,8vw,54px);font-weight:900;letter-spacing:2px}
.sr{display:flex;gap:36px;align-items:center;margin-top:6px}
.sv{font-family:'Orbitron',sans-serif;font-size:clamp(22px,6vw,38px);font-weight:900;text-align:center}
.sl{font-size:7px;letter-spacing:4px;color:#152030;text-align:center;margin-top:4px}
.ss{color:#0a1828;font-size:28px}
.br{display:flex;gap:14px;margin-top:14px}
.bn{padding:12px 28px;background:rgba(0,0,0,.5);font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:3px;cursor:pointer;border-radius:4px;transition:all .2s;border:1px solid}
.bp{border-color:#00f5c8;color:#00f5c8;box-shadow:0 0 14px #00f5c820}
.bs{border-color:#152030;color:#1e3040}
.bn:hover{filter:brightness(1.4)}
#ct{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;pointer-events:none}
#ch{color:#1a2a3a;font-size:7px;letter-spacing:2px;text-align:center}
#ai{position:absolute;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(2,4,14,.9);border:1px solid #ff2d6f44;color:#ff2d6f;
  font-size:8px;letter-spacing:4px;padding:5px 16px;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div class="ov hide" id="ts">
    <div class="ed">◈ 2026 EDITION ◈</div>
    <div class="tm">GORILLA</div>
    <div class="ts2">THE BANANA WARS</div>
    <div class="ml">— scegli modalità —</div>
    <div class="mr">
      <button class="mb c1" id="b1v1">👥 1 vs 1<small>stesso schermo</small></button>
      <button class="mb c2" id="bai">🤖 vs AI<small>sfida il computer</small></button>
    </div>
    <div class="tip">
      <div>🖱 <span class="c1">Muovi il cursore</span> → punta l'angolo</div>
      <div>🖱 <span class="c2">Tieni premuto</span> → carica la potenza</div>
      <div>🖱 <span class="c3">Rilascia</span> → spara!</div>
    </div>
    <div class="cr">INSPIRED BY GORILLAS.BAS — DOS 1991</div>
  </div>
  <div class="ov hide" id="go">
    <div class="rl">round over</div>
    <div class="wt" id="wt"></div>
    <div class="sr">
      <div><div class="sv c1" id="s0">0</div><div class="sl" id="l0">P1</div></div>
      <div class="ss">:</div>
      <div><div class="sv c2" id="s1">0</div><div class="sl" id="l1">P2</div></div>
    </div>
    <div class="br">
      <button class="bn bp" id="rb">REMATCH</button>
      <button class="bn bs" id="mb2">MENU</button>
    </div>
  </div>
  <div id="ct" class="hide"><div id="ch">⚡ TIENI PREMUTO · RILASCIA PER SPARARE</div></div>
  <div id="ai" class="hide">🤖 AI CALCOLA...</div>
</div>
<script>
'use strict';
const TAU=Math.PI*2;
const rnd=(a,b)=>a+Math.random()*(b-a);
const GRAV=9.8, DT=0.042, N_BLDG=9;
const CHARGE_CYCLE=8.0;
// 3-D offsets — big enough to see clearly
const SW=26, TH=16; // side width, top height

let CW=700,CH=390,GW=48,GH=60,EXPL_R=36;
let canvas,ctx,state=null,scores=[0,0],raf=null,drag=null,mode='1v1';

// ─── PALETTE ──────────────────────────────────────────────────
const C={p1:'#00f5c8',p2:'#ff2d6f',banana:'#ffd000',expl:'#ff5500'};

// 6 building types — each with 5 colour keys
// face=front wall, side=right face, roof=top, trim=neon edge, win=window, sign=neon sign, lobby=ground
const PALS=[
  {face:'#0d1f35',side:'#060f1a',roof:'#0a1828',trim:'#00f5c8',win:'#c8f0ff',sign:'#00f5c8',lobby:'#081420'},
  {face:'#180a30',side:'#0c041a',roof:'#140824',trim:'#cc44ff',win:'#e8c8ff',sign:'#dd88ff',lobby:'#100620'},
  {face:'#200a0a',side:'#100404',roof:'#180808',trim:'#ff3344',win:'#ffc8cc',sign:'#ff7788',lobby:'#140606'},
  {face:'#0a1800',side:'#050e00',roof:'#081400',trim:'#33ff77',win:'#c8ffd8',sign:'#77ffaa',lobby:'#060f00'},
  {face:'#1e1000',side:'#100800',roof:'#180c00',trim:'#ff9900',win:'#ffe8b0',sign:'#ffcc44',lobby:'#100800'},
  {face:'#000e22',side:'#00080f',roof:'#000c1c',trim:'#0099ff',win:'#b0d8ff',sign:'#44aaff',lobby:'#000810'},
];

// ─── BUILDINGS ────────────────────────────────────────────────
function buildCity(){
  const bs=[];let x=0;
  const minW=CW/(N_BLDG+1.5),maxW=CW/(N_BLDG-1.5);
  for(let i=0;i<N_BLDG;i++){
    const w=i===N_BLDG-1?CW-x:rnd(minW,maxW);
    const h=rnd(CH*.28,CH*.72);
    const pal=PALS[i%PALS.length];
    bs.push({x,y:CH-h,w,h,pal,craters:[],off:null,
      // store seeded random values for consistent detail rendering
      seed:Math.random()*1000});
    x+=w;
  }
  return bs;
}

function shade(hex,f){
  return '#'+[1,3,5].map(i=>Math.min(255,Math.round(parseInt(hex.slice(i,i+2),16)*f))
    .toString(16).padStart(2,'0')).join('');
}

function renderBuilding(b){
  const oc=document.createElement('canvas');
  const fw=Math.ceil(b.w), fh=Math.ceil(b.h);
  oc.width=fw+SW+2; oc.height=fh+TH+2;
  const g=oc.getContext('2d');
  const p=b.pal;
  const rng=(()=>{let s=b.seed|0;return()=>{s=(s*9301+49297)%233280;return s/233280;};})();

  // ═══════════════════════════════════════
  //  RIGHT SIDE FACE
  // ═══════════════════════════════════════
  g.beginPath();
  g.moveTo(fw,TH); g.lineTo(fw+SW,0); g.lineTo(fw+SW,fh); g.lineTo(fw,fh+TH);
  g.closePath();
  const sideGrad=g.createLinearGradient(fw,0,fw+SW,0);
  sideGrad.addColorStop(0,shade(p.side,.5));
  sideGrad.addColorStop(1,shade(p.side,.9));
  g.fillStyle=sideGrad; g.fill();

  // side: skewed horizontal floor lines
  g.save();
  g.beginPath();
  g.moveTo(fw,TH); g.lineTo(fw+SW,0); g.lineTo(fw+SW,fh); g.lineTo(fw,fh+TH);
  g.clip();
  const flH=Math.max(10,fh/Math.round(fh/16));
  g.strokeStyle='rgba(0,0,0,.3)'; g.lineWidth=1;
  for(let fy=TH;fy<=fh+TH;fy+=flH){
    g.beginPath(); g.moveTo(fw,fy); g.lineTo(fw+SW,fy-TH); g.stroke();
  }
  // side: window glow slits
  for(let fy=TH+flH*.4;fy<fh;fy+=flH){
    const wg=g.createLinearGradient(fw+1,0,fw+SW-1,0);
    wg.addColorStop(0,'rgba(0,0,0,0)');
    wg.addColorStop(.4,p.win+'99');
    wg.addColorStop(1,'rgba(0,0,0,.1)');
    g.fillStyle=wg; g.fillRect(fw+1,fy,SW-2,6);
  }
  g.restore();

  // ═══════════════════════════════════════
  //  TOP / ROOF FACE
  // ═══════════════════════════════════════
  g.beginPath();
  g.moveTo(0,TH); g.lineTo(fw,TH); g.lineTo(fw+SW,0); g.lineTo(SW,0);
  g.closePath();
  const roofGrad=g.createLinearGradient(0,TH,fw+SW,0);
  roofGrad.addColorStop(0,shade(p.roof,2.2));
  roofGrad.addColorStop(.5,shade(p.roof,1.6));
  roofGrad.addColorStop(1,shade(p.roof,1.0));
  g.fillStyle=roofGrad; g.fill();

  // roof: HVAC units & water tanks
  g.save();
  g.beginPath();
  g.moveTo(0,TH); g.lineTo(fw,TH); g.lineTo(fw+SW,0); g.lineTo(SW,0); g.clip();
  const nEquip=Math.max(1,Math.floor(fw/45));
  for(let ei=0;ei<nEquip;ei++){
    const ex=6+ei*(fw/nEquip)+rng()*(fw/nEquip)*.5;
    const ew=8+rng()*18, eh=4+rng()*7;
    // box face
    g.fillStyle=shade(p.roof,1.4);
    g.fillRect(ex,TH-eh,ew,eh);
    // box top (skewed)
    g.fillStyle=shade(p.roof,2.5);
    g.beginPath();
    g.moveTo(ex,TH-eh);
    g.lineTo(ex+ew,TH-eh);
    g.lineTo(ex+ew+SW*.3,TH-eh-TH*.4);
    g.lineTo(ex+SW*.3,TH-eh-TH*.4);
    g.closePath(); g.fill();
    // box right side
    g.fillStyle=shade(p.roof,.7);
    g.beginPath();
    g.moveTo(ex+ew,TH-eh);
    g.lineTo(ex+ew+SW*.3,TH-eh-TH*.4);
    g.lineTo(ex+ew+SW*.3,TH-TH*.4);
    g.lineTo(ex+ew,TH);
    g.closePath(); g.fill();
  }
  g.restore();

  // Rooftop neon trim
  g.strokeStyle=p.trim; g.lineWidth=2;
  g.shadowColor=p.trim; g.shadowBlur=10;
  g.beginPath(); g.moveTo(0,TH); g.lineTo(fw,TH); g.stroke();
  g.beginPath(); g.moveTo(0,TH); g.lineTo(SW,0); g.stroke();
  g.shadowBlur=0;

  // ═══════════════════════════════════════
  //  FRONT FACE — modern glass curtain wall
  // ═══════════════════════════════════════
  // Base concrete/steel gradient
  const faceGrad=g.createLinearGradient(0,TH,fw,TH+fh);
  faceGrad.addColorStop(0,shade(p.face,1.15));
  faceGrad.addColorStop(.45,p.face);
  faceGrad.addColorStop(1,shade(p.face,.75));
  g.fillStyle=faceGrad; g.fillRect(0,TH,fw,fh);

  // Ambient occlusion — darker edges
  const aoLeft=g.createLinearGradient(0,TH,fw*.25,TH);
  aoLeft.addColorStop(0,'rgba(0,0,0,.45)'); aoLeft.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=aoLeft; g.fillRect(0,TH,fw*.25,fh);
  const aoRight=g.createLinearGradient(fw*.75,TH,fw,TH);
  aoRight.addColorStop(0,'rgba(0,0,0,0)'); aoRight.addColorStop(1,'rgba(0,0,0,.35)');
  g.fillStyle=aoRight; g.fillRect(fw*.75,TH,fw*.25,fh);

  // Window grid — proper curtain wall
  const cw2=Math.max(13,fw/Math.round(fw/20)); // column width
  const rh2=Math.max(11,fh/Math.round(fh/17)); // row height
  const nCols=Math.floor(fw/cw2);
  const nRows=Math.floor(fh/rh2);
  const mullW=2.5, mullH=2.5;

  for(let col=0;col<nCols;col++){
    for(let row=0;row<nRows;row++){
      const wx=col*cw2+mullW/2;
      const wy=TH+row*rh2+mullH/2;
      const ww=cw2-mullW;
      const wh=rh2-mullH;
      if(ww<4||wh<4) continue;

      // Determine if window is lit (seeded random)
      const lit=rng()>.35;
      const warmLight=rng()>.5;

      if(lit){
        // Lit window: warm/cool interior glow
        const lc=warmLight?'#ffe8b0':p.win;
        const litGrad=g.createRadialGradient(wx+ww/2,wy+wh/2,0,wx+ww/2,wy+wh/2,Math.max(ww,wh)*.7);
        litGrad.addColorStop(0,lc+'ff');
        litGrad.addColorStop(.5,lc+'cc');
        litGrad.addColorStop(1,shade(lc,.5)+'88');
        g.fillStyle=litGrad; g.fillRect(wx,wy,ww,wh);
        // Window shine diagonal
        g.fillStyle='rgba(255,255,255,.2)';
        g.beginPath(); g.moveTo(wx,wy); g.lineTo(wx+ww*.55,wy); g.lineTo(wx,wy+wh*.45); g.closePath(); g.fill();
        // Subtle glow bleed
        g.shadowColor=lc; g.shadowBlur=6;
        g.fillStyle=lc+'22'; g.fillRect(wx,wy,ww,wh);
        g.shadowBlur=0;
      } else {
        // Dark window: sky/city reflection
        const darkGrad=g.createLinearGradient(wx,wy,wx+ww,wy+wh);
        darkGrad.addColorStop(0,'rgba(20,40,80,.75)');
        darkGrad.addColorStop(.5,p.face+'44');
        darkGrad.addColorStop(1,'rgba(0,0,0,.65)');
        g.fillStyle=darkGrad; g.fillRect(wx,wy,ww,wh);
        // Specular reflection slash
        if(rng()>.5){
          g.fillStyle='rgba(120,180,255,.08)';
          g.beginPath(); g.moveTo(wx,wy); g.lineTo(wx+ww*.7,wy); g.lineTo(wx,wy+wh*.6); g.closePath(); g.fill();
        }
      }

      // Mullion lines (horizontal + vertical structural frame)
      g.strokeStyle='rgba(0,0,0,.55)'; g.lineWidth=mullW;
      g.strokeRect(wx,wy,ww,wh);
    }
  }

  // Vertical structural fins / pilasters
  const nFins=Math.max(2,Math.round(fw/50));
  for(let fi=0;fi<=nFins;fi++){
    const fx=fi*(fw/nFins);
    g.fillStyle=shade(p.face,1.4)+'99';
    g.fillRect(fx-1.5,TH,3,fh);
    // neon edge on fin
    g.fillStyle=p.trim+'33';
    g.fillRect(fx-.5,TH,1,fh);
  }

  // ── SETBACK / TERRACE (tall buildings only) ──────────────
  if(fh>CH*.4&&fw>55){
    const tY=TH+fh*.32;
    const tDepth=rnd(8,18);
    const tW=fw*.15+rng()*fw*.2; // setback inset
    // Terrace ledge top
    g.fillStyle=shade(p.roof,1.8);
    g.fillRect(0,tY,fw,tDepth);
    // Terrace AO
    const taGrad=g.createLinearGradient(0,tY,0,tY+tDepth);
    taGrad.addColorStop(0,shade(p.face,.6)+'cc'); taGrad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=taGrad; g.fillRect(0,tY,fw,tDepth);
    // Terrace neon rail
    g.strokeStyle=p.trim+'aa'; g.lineWidth=1.5;
    g.shadowColor=p.trim; g.shadowBlur=6;
    g.beginPath(); g.moveTo(0,tY); g.lineTo(fw,tY); g.stroke();
    g.shadowBlur=0;
  }

  // ── NEON BILLBOARD / SIGN ────────────────────────────────
  const sY=TH+fh*.1;
  const sH=Math.max(7,fh*.038);
  g.fillStyle=p.sign+'20'; g.fillRect(5,sY-sH/2,fw-10,sH+1);
  g.strokeStyle=p.sign+'60'; g.lineWidth=1;
  g.strokeRect(5,sY-sH/2,fw-10,sH+1);
  g.strokeStyle=p.sign; g.lineWidth=2;
  g.shadowColor=p.sign; g.shadowBlur=16;
  g.beginPath(); g.moveTo(7,sY); g.lineTo(fw-7,sY); g.stroke();
  g.shadowBlur=0;

  // ── SPIRE / ANTENNA ──────────────────────────────────────
  const spX=fw*.3+rng()*fw*.4;
  g.strokeStyle=shade(p.trim,1.1); g.lineWidth=2;
  g.beginPath(); g.moveTo(spX,TH); g.lineTo(spX,TH-22); g.stroke();
  // taper
  g.strokeStyle=shade(p.trim,.9); g.lineWidth=1;
  g.beginPath(); g.moveTo(spX,TH-22); g.lineTo(spX,TH-32); g.stroke();
  // beacon
  g.fillStyle=p.sign; g.shadowColor=p.sign; g.shadowBlur=12;
  g.beginPath(); g.arc(spX,TH-32,3,0,TAU); g.fill(); g.shadowBlur=0;
  // guy wires
  g.strokeStyle=p.trim+'55'; g.lineWidth=.8;
  g.beginPath(); g.moveTo(spX,TH-18); g.lineTo(spX-fw*.22,TH); g.stroke();
  g.beginPath(); g.moveTo(spX,TH-18); g.lineTo(spX+fw*.22,TH); g.stroke();

  // ── GROUND FLOOR / LOBBY ─────────────────────────────────
  const lobH=Math.min(fh*.11,20);
  g.fillStyle=shade(p.lobby,.8);
  g.fillRect(0,TH+fh-lobH,fw,lobH);
  // entrance arch
  const archW=Math.min(fw*.28,28);
  g.fillStyle='rgba(0,0,0,.9)';
  g.beginPath();
  g.arc(fw/2,TH+fh,archW/2,Math.PI,0);
  g.lineTo(fw/2+archW/2,TH+fh); g.lineTo(fw/2-archW/2,TH+fh);
  g.closePath(); g.fill();
  // lobby glow
  const lgGrad=g.createRadialGradient(fw/2,TH+fh,0,fw/2,TH+fh,archW);
  lgGrad.addColorStop(0,p.sign+'55'); lgGrad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=lgGrad; g.fillRect(fw/2-archW,TH+fh-lobH,archW*2,lobH);

  // ═══════════════════════════════════════
  //  CRATER HOLES  (destination-out punch)
  // ═══════════════════════════════════════
  b.craters.forEach(cr=>{
    const lcx=cr.cx-b.x, lcy=cr.cy-b.y+TH;
    // scorch ring (drawn BEFORE hole)
    const sc=g.createRadialGradient(lcx,lcy,cr.r*.2,lcx,lcy,cr.r*1.3);
    sc.addColorStop(0,'rgba(255,100,0,.5)');
    sc.addColorStop(.6,'rgba(120,30,0,.25)');
    sc.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=sc; g.beginPath(); g.arc(lcx,lcy,cr.r*1.3,0,TAU); g.fill();
    // punch hole
    const hole=g.createRadialGradient(lcx,lcy,0,lcx,lcy,cr.r);
    hole.addColorStop(0,'rgba(0,0,0,1)');
    hole.addColorStop(.75,'rgba(0,0,0,.96)');
    hole.addColorStop(1,'rgba(0,0,0,0)');
    g.save(); g.globalCompositeOperation='destination-out';
    g.fillStyle=hole; g.beginPath(); g.arc(lcx,lcy,cr.r,0,TAU); g.fill();
    g.restore();
  });

  b.off=oc;
}

function placeGorillas(bs){
  const b1=bs[1],b2=bs[bs.length-2];
  return[{x:b1.x+b1.w/2-GW/2,y:b1.y-GH},{x:b2.x+b2.w/2-GW/2,y:b2.y-GH}];
}
function genStars(n){
  return Array.from({length:n},()=>({
    x:rnd(0,CW),y:rnd(0,CH*.5),r:rnd(.15,1.4),
    phase:rnd(0,TAU),bright:Math.random()>.88}));
}

// ─── PHYSICS ──────────────────────────────────────────────────
function stepBanana(b,wind){
  return{
    pos:{x:b.pos.x+b.vel.x*DT,y:b.pos.y+b.vel.y*DT},
    vel:{x:b.vel.x+wind*DT,y:b.vel.y+GRAV*DT},
    spin:b.spin+DT*9,
    safe:Math.max(0,(b.safe||0)-1)
  };
}

function hitBuilding(pos,bs){
  for(let i=0;i<bs.length;i++){
    const b=bs[i];
    if(pos.x>=b.x&&pos.x<=b.x+b.w&&pos.y>=b.y&&pos.y<=CH-14){
      // FIX: pass through existing craters
      const inCrater=b.craters.some(cr=>Math.hypot(pos.x-cr.cx,pos.y-cr.cy)<cr.r*.85);
      if(!inCrater) return i;
    }
  }
  return -1;
}

function hitGorilla(pos,gors,shooter,banana){
  const safe=banana&&banana.safe>0;
  const order=safe?[1-shooter]:[1-shooter,shooter];
  for(const i of order){
    const g=gors[i],dx=pos.x-(g.x+GW/2),dy=pos.y-(g.y+GH/2);
    if(Math.hypot(dx,dy)<EXPL_R*.55) return i;
  }
  return -1;
}

function blastBuilding(b,cx,cy,r){
  let merged=false;
  for(const cr of b.craters){
    if(Math.hypot(cx-cr.cx,cy-cr.cy)<cr.r*1.4){
      const nr=Math.min(cr.r+r*.5,r*4);
      cr.cx=(cr.cx*cr.r+cx*r)/(cr.r+r);
      cr.cy=(cr.cy*cr.r+cy*r)/(cr.r+r);
      cr.r=nr; merged=true; break;
    }
  }
  if(!merged) b.craters.push({cx,cy,r});
  renderBuilding(b);
}

// ─── AI ───────────────────────────────────────────────────────
function computeAI(){
  const src=state.gorillas[1],tgt=state.gorillas[0];
  const sx=src.x+GW/2,sy=src.y+GH*.28,tx=tgt.x+GW/2,ty=tgt.y+GH/2;
  let bA=90,bP=55,bD=Infinity;
  for(let a=5;a<=175;a+=2) for(let p=20;p<=100;p+=4){
    const rad=(180-a)*Math.PI/180,spd=p*1.55;
    let px=sx,py=sy,pvx=Math.cos(-rad)*spd,pvy=Math.sin(-rad)*spd,md=Infinity;
    for(let s=0;s<300;s++){
      pvx+=state.wind*DT;pvy+=GRAV*DT;px+=pvx*DT;py+=pvy*DT;
      if(px<0||px>CW||py>CH) break;
      const d=Math.hypot(px-tx,py-ty);
      if(d<md) md=d;
      if(d<EXPL_R) break;
    }
    if(md<bD){bD=md;bA=a;bP=p;}
  }
  return{angle:bA+rnd(-7,7),power:Math.min(100,bP+rnd(-5,5))};
}

// ─── GAME FLOW ────────────────────────────────────────────────
function initGame(m){
  if(m) mode=m;
  const buildings=buildCity();
  buildings.forEach(b=>renderBuilding(b));
  state={
    buildings,gorillas:placeGorillas(buildings),
    wind:rnd(-10,10),stars:genStars(70),
    turn:0,phase:'aiming',
    angles:[45,135],powers:[0,0],
    banana:null,explosion:null,expParts:[],
    throwAnim:false,celebEnd:0,t:0,aiTimer:0,killedPlayer:-1
  };
  document.getElementById('l1').textContent=mode==='vsAI'?'AI':'P2';
  show('playing');
}
function curAngle(){return state.angles[state.turn];}
function curPower(){return state.powers[state.turn];}

function nextTurn(){
  state.phase='aiming';state.turn=1-state.turn;
  state.banana=null;state.throwAnim=false;
  state.wind=rnd(-10,10);state.explosion=null;
  if(mode==='vsAI'&&state.turn===1){
    state.aiTimer=state.t+1.0;
    document.getElementById('ai').classList.remove('hide');
  }
}

function doFire(angle,power){
  const g=state.gorillas[state.turn];
  const cx=g.x+GW/2,cy=g.y+GH*.28;
  const rad=(state.turn===0?angle:180-angle)*Math.PI/180;
  const spd=power*1.55;
  const vx=Math.cos(-rad)*spd,vy=Math.sin(-rad)*spd;
  state.banana={
    pos:{x:cx+Math.cos(-rad)*30,y:cy+Math.sin(-rad)*30},
    vel:{x:vx,y:vy},spin:0,safe:20
  };
  state.phase='flying';state.throwAnim=true;
}

function triggerExplosion(x,y,killed){
  state.phase='exploding';state.banana=null;state.throwAnim=false;
  state.expParts=Array.from({length:34},()=>({
    x,y,vx:rnd(-1.8,1.8),vy:rnd(-2.8,.5),r:rnd(2,8),
    col:[C.expl,C.banana,'#ff2200','#ffaa00','#fff'][Math.floor(Math.random()*5)]
  }));
  state.explosion={x,y,t0:state.t,dur:1.1,killed};
}

function show(s){
  ['ts','go','ct','ai'].forEach(id=>document.getElementById(id).classList.add('hide'));
  if(s==='title') document.getElementById('ts').classList.remove('hide');
  if(s==='gameover') document.getElementById('go').classList.remove('hide');
  if(s==='playing') document.getElementById('ct').classList.remove('hide');
}

function drawWindHUD(){
  if(!state) return;
  const w=state.wind,aw=Math.abs(w),gr=w>=0,wc=gr?C.p1:C.p2;

  const tw=120,fw=str*tw;

  ctx.beginPath(); ctx.roundRect(-tw/2,-3,tw,6,3); ctx.fill();
  const fg2=ctx.createLinearGradient(-tw/2,0,tw/2,0);

  const ax=gr?-tw/2+fw+Math.sin(state.t*5)*2.5*str:tw/2-fw-Math.sin(state.t*5)*2.5*str;

  ctx.fillStyle='#253545'; ctx.font='7px "Share Tech Mono",monospace'; ctx.textAlign='left';
  ctx.fillText('WIND',-pw/2+10,-ph/2-3);
  ctx.restore();
}

// ─── DRAW: BUILDINGS ──────────────────────────────────────────

// ─── DRAW: BANANA ─────────────────────────────────────────────
function drawBanana(){
  if(!state.banana) return;
  const{pos,spin}=state.banana;
  ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(spin);
  // Banana = thick curved crescent arc
  const R=11,r=6,sweep=Math.PI*.72;
  const sA=-Math.PI/2-sweep/2, eA=-Math.PI/2+sweep/2;
  ctx.shadowColor='#ffd000'; ctx.shadowBlur=22;
  ctx.beginPath();
  ctx.arc(0,0,R,sA,eA);
  ctx.arc(0,0,r,eA,sA,true);
  ctx.closePath();
  const bg=ctx.createRadialGradient(0,-2,1,0,0,R);
  bg.addColorStop(0,'#fff7a0');
  bg.addColorStop(.4,'#ffd000');
  bg.addColorStop(1,'#c87800');
  ctx.fillStyle=bg; ctx.fill();
  // shine
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,220,.55)';
  ctx.beginPath();
  ctx.arc(0,-1,R*.42,sA,sA+sweep*.45);
  ctx.arc(0,-1,r*.9,sA+sweep*.45,sA,true);
  ctx.closePath(); ctx.fill();
  // tips
  ctx.fillStyle='#7a4400';
  ctx.beginPath(); ctx.arc(R*Math.cos(sA),R*Math.sin(sA),2.5,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(R*Math.cos(eA),R*Math.sin(eA),2.5,0,TAU); ctx.fill();
  ctx.restore();
}

// ─── DRAW: EXPLOSION ──────────────────────────────────────────
function drawExplosion(){
  if(!state.explosion) return;
  const ex=state.explosion,p=Math.min((state.t-ex.t0)/ex.dur,1),ep=1-p;
  ctx.save();
  [1,.55,.28].forEach((sc,i)=>{
    const rp=Math.max(0,p-i*.1);if(rp<=0)return;
    ctx.globalAlpha=ep*.5*(1-i*.2);
    ctx.strokeStyle=i===0?'#ffee88':i===1?C.expl:'#ff1100';
    ctx.lineWidth=(4-i)*(1-rp);
    ctx.beginPath(); ctx.arc(ex.x,ex.y,EXPL_R*rp*(1+i*.6),0,TAU); ctx.stroke();
  });
  ctx.globalAlpha=1;
  const rg=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,EXPL_R*ep);
  rg.addColorStop(0,`rgba(255,255,230,${ep*.98})`);
  rg.addColorStop(.22,`rgba(255,210,40,${ep*.9})`);
  rg.addColorStop(.55,`rgba(255,70,0,${ep*.75})`);
  rg.addColorStop(1,'rgba(160,0,0,0)');
  ctx.fillStyle=rg; ctx.shadowColor='#ff8800'; ctx.shadowBlur=30*ep;
  ctx.beginPath(); ctx.arc(ex.x,ex.y,EXPL_R*ep,0,TAU); ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();
  state.expParts.forEach(pt=>{
    const px=pt.x+pt.vx*p*55,py=pt.y+pt.vy*p*55+.5*GRAV*p*p*35;
    ctx.save(); ctx.globalAlpha=ep*.85; ctx.fillStyle=pt.col; ctx.shadowColor=pt.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(px,py,pt.r*ep,0,TAU); ctx.fill(); ctx.restore();
  });
}

// ─── DRAW: AIM GUIDE ──────────────────────────────────────────
function drawAimGuide(){
  if(state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const g=state.gorillas[state.turn],col=state.turn===0?C.p1:C.p2;
  const cx=g.x+GW/2,cy=g.y+GH*.28;
  const aRad=(state.turn===0?curAngle():180-curAngle())*Math.PI/180;
  const spd=curPower()*1.55;
  let px=cx,py=cy,pvx=Math.cos(-aRad)*spd,pvy=Math.sin(-aRad)*spd;
  const pts=[];
  for(let i=0;i<85;i++){
    pvx+=state.wind*DT*3;pvy+=GRAV*DT*3;px+=pvx*DT*3;py+=pvy*DT*3;
    if(px<-10||px>CW+10||py>CH+10) break;
    pts.push({x:px,y:py});
  }
  ctx.save();
  pts.forEach((pt,i)=>{
    if(i===0||i%2) return;
    ctx.globalAlpha=(1-i/pts.length)*.18; ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pts[i-1].x,pts[i-1].y); ctx.lineTo(pt.x,pt.y); ctx.stroke();
  });
  ctx.globalAlpha=1;
  const al=46,ax=cx+Math.cos(-aRad)*al,ay=cy+Math.sin(-aRad)*al;
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ax,ay); ctx.stroke();
  const an=Math.atan2(ay-cy,ax-cx),ah=10;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(ax,ay);
  ctx.lineTo(ax-Math.cos(an-.5)*ah,ay-Math.sin(an-.5)*ah);
  ctx.lineTo(ax-Math.cos(an+.5)*ah,ay-Math.sin(an+.5)*ah);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
}

// ─── DRAW: HUD ────────────────────────────────────────────────
function lerpCol(a,b,t){
  return '#'+[1,3,5].map(i=>{
    const av=parseInt(a.slice(i,i+2),16),bv=parseInt(b.slice(i,i+2),16);
    return Math.round(av+(bv-av)*t).toString(16).padStart(2,'0');
  }).join('');
}
function drawHUD(){
  const HH=52;
  const hg=ctx.createLinearGradient(0,0,0,HH);
  hg.addColorStop(0,'rgba(1,4,16,.96)'); hg.addColorStop(1,'rgba(2,10,28,.86)');
  ctx.fillStyle=hg; ctx.fillRect(0,0,CW,HH);
  ctx.strokeStyle='rgba(0,200,160,.25)'; ctx.lineWidth=1; ctx.shadowColor='#00f5c8'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(0,HH); ctx.lineTo(CW,HH); ctx.stroke(); ctx.shadowBlur=0;
  const fs=Math.max(11,CW*.017);
  ctx.font=`900 ${fs}px "Orbitron",sans-serif`;
  ctx.fillStyle=C.p1; ctx.shadowColor=C.p1; ctx.shadowBlur=10;
  ctx.fillText(`P1  ${scores[0]}`,12,22); ctx.shadowBlur=0;
  ctx.fillStyle=C.p2; ctx.shadowColor=C.p2; ctx.shadowBlur=10; ctx.textAlign='right';
  ctx.fillText(`${scores[1]}  ${mode==='vsAI'?'AI':'P2'}`,CW-12,22); ctx.shadowBlur=0; ctx.textAlign='left';
  const tc=state.turn===0?C.p1:C.p2;
  const tn=mode==='vsAI'&&state.turn===1?'AI':`P${state.turn+1}`;
  const lbl={flying:'● IN VOLO',exploding:'✦ BOOM',celebrating:'★ VITTORIA',done:''}[state.phase]||`▸ ${tn} MIRA`;
  ctx.font=`bold ${Math.max(10,CW*.014)}px "Share Tech Mono",monospace`;
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=14; ctx.textAlign='center';
  ctx.fillText(lbl,CW/2,22); ctx.shadowBlur=0; ctx.textAlign='left';
  if(state.phase==='aiming'&&!(mode==='vsAI'&&state.turn===1)){
    const pwr=curPower(),isCharging=!!drag;
    ctx.fillStyle='#2a3d4f'; ctx.font='7px "Share Tech Mono",monospace'; ctx.textAlign='right';
    ctx.fillText(`${Math.round(curAngle())}°`,CW-12,40); ctx.textAlign='left';
    const bx=CW/2-105,by=33,bw=210,bh=14,segs=21;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(bx,by,bw,bh);
    const fs2=Math.round((pwr/100)*segs);
    for(let s=0;s<segs;s++){
      const fx=bx+s*(bw/segs)+1,fw2=bw/segs-2;
      if(s<fs2){
        const t=s/segs;
        const sc=t<.5?lerpCol('#00f5c8','#ffd000',t*2):lerpCol('#ffd000','#ff2d6f',(t-.5)*2);
        const pulse=isCharging?.6+.4*Math.sin(state.t*11+s*.35):1;
        ctx.fillStyle=sc; ctx.globalAlpha=pulse; ctx.shadowColor=sc; ctx.shadowBlur=6;
        ctx.fillRect(fx,by+1,fw2,bh-2); ctx.shadowBlur=0; ctx.globalAlpha=1;
      } else {
        ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fillRect(fx,by+1,fw2,bh-2);
      }
    }
    if(isCharging){
      ctx.shadowColor=C.banana; ctx.shadowBlur=14*(.35+.65*Math.abs(Math.sin(state.t*9)));
      ctx.strokeStyle=C.banana+'aa'; ctx.lineWidth=1.5;
    } else {
      ctx.strokeStyle='rgba(0,180,140,.25)'; ctx.lineWidth=1;
    }
    ctx.strokeRect(bx,by,bw,bh); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.28)'; ctx.font='bold 7px "Share Tech Mono",monospace';
    ctx.fillText('PWR',bx+4,by+bh-2);
    ctx.textAlign='right'; ctx.fillText(`${Math.round(pwr)}%`,bx+bw-4,by+bh-2); ctx.textAlign='left';
    if(!isCharging){
      ctx.fillStyle='rgba(30,60,80,.9)'; ctx.font='7px "Share Tech Mono",monospace'; ctx.textAlign='center';
      ctx.fillText('TIENI PREMUTO · RILASCIA PER SPARARE',CW/2,by+bh+11); ctx.textAlign='left';
    }
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop(){
  if(!state){raf=requestAnimationFrame(loop);return;}
  state.t+=DT;
  // AI
  if(mode==='vsAI'&&state.turn===1&&state.phase==='aiming'&&state.aiTimer>0&&state.t>=state.aiTimer){
    document.getElementById('ai').classList.add('hide');
    const sh=computeAI();
    state.angles[1]=sh.angle; state.powers[1]=sh.power;
    state.aiTimer=0; doFire(sh.angle,sh.power);
  }
  // physics
  if(state.phase==='flying'&&state.banana){
    for(let i=0;i<3;i++){
      state.banana=stepBanana(state.banana,state.wind);
      const pos=state.banana.pos;
      if(pos.x<-50||pos.x>CW+50||pos.y>CH+50){nextTurn();break;}
      const gh=hitGorilla(pos,state.gorillas,state.turn,state.banana);
      if(gh!==-1){triggerExplosion(pos.x,pos.y,gh);break;}
      const bh=hitBuilding(pos,state.buildings);
      if(bh!==-1){blastBuilding(state.buildings[bh],pos.x,pos.y,EXPL_R);triggerExplosion(pos.x,pos.y,-1);break;}
    }
  }
  if(state.phase==='exploding'){
    if((state.t-state.explosion.t0)/state.explosion.dur>=1){
      if(state.explosion.killed!==-1){
        state.killedPlayer=state.explosion.killed;
        state.phase='celebrating'; state.celebEnd=state.t+2.5;
      } else nextTurn();
    }
  }
  if(state.phase==='celebrating'&&state.t>=state.celebEnd){
    const killed=state.killedPlayer;
    const winner=(killed===state.turn)?1-state.turn:state.turn;
    scores[winner]++;
    document.getElementById('s0').textContent=scores[0];
    document.getElementById('s1').textContent=scores[1];
    const wn=mode==='vsAI'&&winner===1?'AI':`P${winner+1}`;
    const wtel=document.getElementById('wt');
    wtel.textContent=killed===state.turn?`💀 ${mode==='vsAI'&&state.turn===1?'AI':'P'+(state.turn+1)} SUICIDIO!`:`${wn} VINCE!`;
    wtel.style.color=winner===0?C.p1:C.p2;
    wtel.style.textShadow=`0 0 36px ${winner===0?C.p1:C.p2}`;
    state.phase='done'; show('gameover');
  }
  updateCharge();
  // render
  ctx.clearRect(0,0,CW,CH);
  drawBg(); drawBuildings(); drawRoad();
  const beatHz=3,raw=(state.t*beatHz)%1;
  const beatPhase=raw<.4?raw/.4:1-(raw-.4)/.6;
  state.gorillas.forEach((g,i)=>{
    if(state.explosion&&state.explosion.killed===i) return;
    if(state.phase==='celebrating'&&state.killedPlayer===i) return;
    const cel=state.phase==='celebrating'&&state.turn===i&&state.killedPlayer!==i;
    const thr=state.throwAnim&&state.turn===i&&state.phase==='flying';
    drawGorilla(g,i,cel,thr,cel?beatPhase:0);
  });
  drawBanana(); drawExplosion(); drawAimGuide(); drawHUD();
  raf=requestAnimationFrame(loop);
}

// ─── INPUT ────────────────────────────────────────────────────
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  CW=vw>=vh?700:390; CH=vw>=vh?390:700;
  EXPL_R=Math.round(CW*.052);
  const scale=Math.min(vw/CW,vh/CH);
  canvas.width=CW; canvas.height=CH;
  canvas.style.width=Math.round(CW*scale)+'px';
  canvas.style.height=Math.round(CH*scale)+'px';
  if(state&&state.phase!=='done'){
    const b=buildCity(); b.forEach(bld=>renderBuilding(bld));
    state.buildings=b; state.gorillas=placeGorillas(b); state.stars=genStars(70);
    if(state.phase==='flying'||state.phase==='exploding'){
      state.phase='aiming'; state.banana=null; state.explosion=null; state.throwAnim=false;
    }
    show('playing');
  } else if(!state) show('title');
  else show('gameover');
}
function getPos(e){
  const r=canvas.getBoundingClientRect(),sx=CW/r.width,sy=CH/r.height;
  const s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};
}
function angleFromPos(pos){
  const g=state.gorillas[state.turn];
  const gx=g.x+GW/2, gy=g.y+GH*.2;
  const dx=pos.x-gx, dy=pos.y-gy;
  let deg;
  if(state.turn===0) deg=Math.atan2(-dy,dx)*180/Math.PI;
  else deg=Math.atan2(-dy,-dx)*180/Math.PI;
  return Math.max(2,Math.min(178,deg));
}
function onHover(e){
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  state.angles[state.turn]=angleFromPos(getPos(e));
}
function onDown(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  state.angles[state.turn]=angleFromPos(getPos(e));
  drag={chargeStart:state.t}; state.powers[state.turn]=0;
}
function onMove(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming'||!drag) return;
  if(mode==='vsAI'&&state.turn===1) return;
  state.angles[state.turn]=angleFromPos(getPos(e));
}
function onUp(e){
  e.preventDefault();
  if(!state||state.phase!=='aiming'||!drag){drag=null;return;}
  if(mode==='vsAI'&&state.turn===1){drag=null;return;}
  const pwr=Math.max(5,state.powers[state.turn]);
  drag=null; doFire(state.angles[state.turn],pwr);
}
function updateCharge(){
  if(!drag||!state||state.phase!=='aiming') return;
  if(mode==='vsAI'&&state.turn===1) return;
  const elapsed=state.t-drag.chargeStart;
  const half=CHARGE_CYCLE/2, phase=elapsed%CHARGE_CYCLE;
  const pwr=phase<half?(phase/half)*100:(1-(phase-half)/half)*100;
  state.powers[state.turn]=Math.max(0,Math.min(100,pwr));
}

window.addEventListener('DOMContentLoaded',()=>{
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',()=>setTimeout(resize,250));
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onUp,{passive:false});
  canvas.addEventListener('mousemove',e=>drag?onMove(e):onHover(e));
  canvas.addEventListener('mousedown',onDown);
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('selectstart',e=>e.preventDefault());
  document.getElementById('b1v1').addEventListener('click',()=>initGame('1v1'));
  document.getElementById('bai').addEventListener('click',()=>initGame('vsAI'));
  document.getElementById('rb').addEventListener('click',()=>initGame());
  document.getElementById('mb2').addEventListener('click',()=>{
    scores=[0,0];
    document.getElementById('s0').textContent='0';
    document.getElementById('s1').textContent='0';
    state=null; show('title');
  });
  raf=requestAnimationFrame(loop);
});
</script>
